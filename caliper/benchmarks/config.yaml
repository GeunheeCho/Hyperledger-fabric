test:
  name: sbom-benchmark
  description: SBOM 성능 테스트
  workers:
    number: 2
  rounds:
    - label: Create Asset 30
      description: SBOM pdc
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workloads/pCreateAsset.js
